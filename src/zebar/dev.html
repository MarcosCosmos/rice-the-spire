<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Kreon:wght@300..700&display=swap" rel="stylesheet" />
    <script type="module" src="https://esm.sh/tsx"></script>
    <!-- import map -->
    <script type="module" crossorigin src="@vite/client"></script>
    <!-- text/babel trickier stops vite/rolldown from moving this script to an external js file, since it needs to be inline to work -->
    <script type="text/babel">
      import { injectIntoGlobalHook } from "@react-refresh";
      injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      import { mount } from "@rice-the-spire";
      import Widget from "@rice-the-spire/widgets/ModeBound.tsx";
      mount(<Widget/>)
    </script>
  </body>
</html>
